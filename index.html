<!DOCTYPE html>
<html>
<head>
  <title>lucia verification</title>
  <style>
    body {
      margin: 0;
      background: #0f0f13;
      font-family: 'Arial';
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 30px rgba(255,105,180,0.3);
    }

    h1 {
      color: #ff69b4;
    }

    button {
      margin-top: 20px;
      padding: 15px 30px;
      border: none;
      border-radius: 30px;
      background: #ff4da6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 20px #ff4da6;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div class="card">
  <h1>xoxo, lucia 💋</h1>
  <p>verify to enter ♡</p>

  <button onclick="login()">verify ♱</button>
</div>

<audio id="bgm" src="music.mp3" loop></audio>

<script>
function login() {
  document.getElementById("bgm").play();

  window.location.href =
  "https://discord.com/oauth2/authorize?client_id=YOUR_CLIENT_ID&redirect_uri=YOUR_REDIRECT&response_type=code&scope=identify%20guilds.join";
}
</script>

</body>
</html>
